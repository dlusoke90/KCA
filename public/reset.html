<!DOCTYPE html>
<html lang="en">
<head>
  <meta property="og:title" content="Kuwaha Cloud Academy" />
  <meta property="og:description" content="Empowering Digital Professionals — Cisco CCNA, AWS, and Linux certification training." />
  <meta property="og:image" content="https://kca-cloudnet.com/KCA-LOGO.png" />
  <meta property="og:url" content="https://kca-cloudnet.com" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://kca-cloudnet.com/KCA-LOGO.png" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reset Password — KCA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0f1a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#111827;border:1px solid #1e2330;border-radius:16px;padding:2.5rem;width:100%;max-width:420px}
.logo{color:#0e8a78;font-size:1.3rem;font-weight:900;letter-spacing:.1em;text-align:center;margin-bottom:.5rem}
h2{text-align:center;color:#fff;margin-bottom:.5rem;font-size:1.4rem}
p{text-align:center;color:#64748b;font-size:.875rem;margin-bottom:1.5rem}
label{display:block;color:#94a3b8;font-size:.8rem;font-weight:600;margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.05em}
input{width:100%;padding:.75rem;background:#1e2330;border:1px solid #2d3748;border-radius:8px;color:#e2e8f0;font-size:.95rem;margin-bottom:1rem;outline:none}
input:focus{border-color:#0e8a78}
.btn{width:100%;padding:.8rem;background:#0e8a78;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer}
.btn:hover{background:#0a6b5e}
.msg{padding:.75rem;border-radius:8px;margin-bottom:1rem;font-size:.875rem;text-align:center}
.msg.success{background:rgba(14,138,120,.15);border:1px solid rgba(14,138,120,.3);color:#0e8a78}
.msg.error{background:rgba(255,77,77,.1);border:1px solid rgba(255,77,77,.3);color:#ff4d4d}
</style>
</head>
<body>
<div class="card">
  <div class="logo">KCA</div>
  <h2>Reset Password</h2>
  <p>Enter your new password below</p>
  <div id="msg"></div>
  <label>New Password</label>
  <input type="password" id="newPass" placeholder="Min. 8 characters">
  <label>Confirm Password</label>
  <input type="password" id="confirmPass" placeholder="Repeat new password">
  <button class="btn" onclick="resetPass()">Reset Password</button>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token');
const email = params.get('email');
if(!token || !email){
  document.getElementById('msg').innerHTML='<div class="msg error">Invalid reset link. Please request a new one.</div>';
}
async function resetPass(){
  const pass = document.getElementById('newPass').value;
  const confirm = document.getElementById('confirmPass').value;
  if(!pass || !confirm){showMsg('Please fill in both fields','error');return;}
  if(pass !== confirm){showMsg('Passwords do not match','error');return;}
  if(pass.length < 8){showMsg('Password must be at least 8 characters','error');return;}
  const r = await fetch('/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,token,password:pass})});
  const d = await r.json();
  if(r.ok){
    showMsg(d.message,'success');
    setTimeout(()=>window.location.href='login.html',2000);
  } else {
    showMsg(d.error,'error');
  }
}
function showMsg(msg,type){
  document.getElementById('msg').innerHTML=`<div class="msg ${type}">${msg}</div>`;
}
</script>
</body>
</html>
