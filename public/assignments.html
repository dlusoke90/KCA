<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KCA Assignments</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0f1a;color:#e2e8f0;min-height:100vh}
header{background:linear-gradient(135deg,#0a1628,#0d2040);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #0e8a78}
.logo{color:#0e8a78;font-size:1.2rem;font-weight:900;display:flex;align-items:center;gap:.5rem}
.logo img{height:36px}
.btn{background:#0e8a78;color:#fff;border:none;padding:.5rem 1.2rem;border-radius:8px;cursor:pointer;font-weight:600;font-size:.875rem;text-decoration:none;display:inline-block}
.btn:hover{background:#0a6b5e}
.container{max-width:900px;margin:0 auto;padding:2rem}
.page-title{font-size:1.4rem;font-weight:800;color:#f8fafc;margin-bottom:1.5rem}
.assignment-card{background:#111827;border:1px solid #1e2330;border-radius:12px;padding:1.5rem;margin-bottom:1.2rem;transition:.2s}
.assignment-card:hover{border-color:#0e8a78}
.a-title{font-size:1rem;font-weight:700;color:#f8fafc;margin-bottom:.3rem}
.a-meta{font-size:.78rem;color:#64748b;margin-bottom:.75rem}
.a-desc{font-size:.875rem;color:#94a3b8;margin-bottom:1rem;line-height:1.5}
.a-file{display:inline-flex;align-items:center;gap:.4rem;background:#0a0f1a;border:1px solid #1e2330;padding:.4rem .9rem;border-radius:6px;color:#3b9eff;font-size:.82rem;font-weight:600;text-decoration:none;margin-bottom:1rem}
.a-file:hover{border-color:#3b9eff}
.reply-section{background:#0a0f1a;border:1px solid #1e2330;border-radius:8px;padding:1rem}
.reply-label{font-size:.78rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem}
.submitted-badge{display:inline-block;background:rgba(14,138,120,.15);color:#0e8a78;border:1px solid rgba(14,138,120,.3);padding:.25rem .7rem;border-radius:12px;font-size:.75rem;font-weight:700;margin-bottom:.75rem}
textarea{width:100%;padding:.65rem .9rem;background:#111827;border:1px solid #1e2330;border-radius:8px;color:#e2e8f0;font-size:.875rem;font-family:inherit;resize:vertical;min-height:80px;margin-bottom:.75rem}
textarea:focus{outline:none;border-color:#0e8a78}
.file-input-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem;flex-wrap:wrap}
.file-label{background:#0a0f1a;border:1px solid #1e2330;padding:.4rem .9rem;border-radius:6px;color:#94a3b8;font-size:.8rem;cursor:pointer;font-weight:600}
.file-label:hover{border-color:#0e8a78;color:#0e8a78}
.file-name{font-size:.78rem;color:#0e8a78}
.submit-btn{background:#0e8a78;color:#fff;border:none;padding:.5rem 1.2rem;border-radius:8px;cursor:pointer;font-weight:600;font-size:.85rem}
.submit-btn:hover{background:#0a6b5e}
.msg{font-size:.82rem;margin-top:.5rem}
.empty{text-align:center;color:#64748b;padding:4rem;font-size:.95rem}
.badge{padding:.2rem .6rem;border-radius:12px;font-size:.7rem;font-weight:700}
.badge-course{background:rgba(14,138,120,.15);color:#0e8a78;border:1px solid rgba(14,138,120,.3)}
</style>
</head>
<body>
<header>
  <div class="logo"><img src="/KCA-LOGO-transparent.png" alt="KCA"> My Assignments</div>
  <div style="display:flex;gap:.75rem;align-items:center">
    <a href="/dashboard" class="btn" style="background:transparent;border:1px solid #0e8a78;color:#0e8a78">← Dashboard</a>
    <button class="btn" onclick="logout()">Sign Out</button>
  </div>
</header>
<div class="container">
  <div class="page-title">📚 Your Assignments</div>
  <div id="assignmentsList"><div class="empty">Loading assignments...</div></div>
</div>
<script>
const token = localStorage.getItem('kca_token');
const user = JSON.parse(localStorage.getItem('kca_user') || '{}');
if (!token) window.location.replace('/login');

async function loadAssignments() {
  const r = await fetch('/api/assignments', { headers: { Authorization: 'Bearer ' + token } });
  const assignments = await r.json();
  const el = document.getElementById('assignmentsList');
  if (!assignments.length) { el.innerHTML = '<div class="empty">📭 No assignments yet. Check back soon!</div>'; return; }
  el.innerHTML = assignments.map(a => `
    <div class="assignment-card" id="card-${a.id}">
      <div class="a-title">${a.title}</div>
      <div class="a-meta">📅 ${new Date(a.created_at).toLocaleDateString()} &nbsp;|&nbsp; 👤 ${a.instructor_name || 'Instructor'}
        ${a.course ? `&nbsp;|&nbsp;<span class="badge badge-course">${a.course}</span>` : ''}
      </div>
      ${a.description ? `<div class="a-desc">${a.description}</div>` : ''}
      ${a.file_path ? `<a href="${a.file_path}" target="_blank" class="a-file">📎 Download Assignment File</a>` : ''}
      <div class="reply-section">
        <div class="reply-label">Your Submission</div>
        ${a.my_reply || a.my_submission ? '<div class="submitted-badge">✅ Submitted</div>' : ''}
        <textarea id="reply-${a.id}" placeholder="Type your answer or notes here...">${a.my_reply || ''}</textarea>
        <div class="file-input-row">
          <label class="file-label" for="file-${a.id}">📎 Attach File</label>
          <input type="file" id="file-${a.id}" style="display:none" onchange="document.getElementById('fname-${a.id}').textContent=this.files[0]?this.files[0].name:''">
          <span class="file-name" id="fname-${a.id}">${a.my_submission ? '(file previously submitted)' : ''}</span>
        </div>
        <button class="submit-btn" onclick="submitReply(${a.id})">
          ${a.my_reply || a.my_submission ? '🔄 Update Submission' : '🚀 Submit'}
        </button>
        <div class="msg" id="msg-${a.id}"></div>
        ${a.instructor_reply ? `<div style="margin-top:1rem;padding-top:.75rem;border-top:1px solid #1e2330"><div style="font-size:.75rem;font-weight:700;color:#0e8a78;margin-bottom:.3rem">💬 Instructor Feedback</div><div style="background:#0a1628;border:1px solid rgba(14,138,120,.3);padding:.75rem;border-radius:8px;font-size:.85rem;color:#e2e8f0;line-height:1.5">${a.instructor_reply}</div></div>` : ''}
      </div>
    </div>`).join('');
}

async function submitReply(id) {
  const reply_text = document.getElementById('reply-' + id).value.trim();
  const file = document.getElementById('file-' + id).files[0];
  const msg = document.getElementById('msg-' + id);

  if (!reply_text && !file) { msg.style.color = '#e74c3c'; msg.textContent = '⚠️ Please add a reply or attach a file'; return; }

  const fd = new FormData();
  if (reply_text) fd.append('reply_text', reply_text);
  if (file) fd.append('file', file);

  msg.style.color = '#0e8a78'; msg.textContent = 'Submitting...';
  const r = await fetch('/api/assignments/' + id + '/submit', {
    method: 'POST', headers: { Authorization: 'Bearer ' + token }, body: fd
  });
  const d = await r.json();
  if (d.message) { msg.textContent = '✅ ' + d.message; loadAssignments(); }
  else { msg.style.color = '#e74c3c'; msg.textContent = '❌ ' + (d.error || 'Failed'); }
}

function logout() { localStorage.removeItem('kca_token'); localStorage.removeItem('kca_user'); window.location.replace('/login'); }
loadAssignments();
</script>
</body>
</html>
