<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="/KCA-LOGO-transparent.png">
<link rel="shortcut icon" href="/KCA-LOGO-transparent.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KCA Assignments</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0f1a;color:#e2e8f0;min-height:100vh}
header{background:linear-gradient(135deg,#0a1628,#0d2040);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #0e8a78}
.logo{color:#0e8a78;font-size:1.2rem;font-weight:900;display:flex;align-items:center;gap:.5rem}
.logo img{height:36px}
.btn{background:#0e8a78;color:#fff;border:none;padding:.5rem 1.2rem;border-radius:8px;cursor:pointer;font-weight:600;font-size:.875rem;text-decoration:none;display:inline-block}
.btn:hover{background:#0a6b5e}
.container{max-width:900px;margin:0 auto;padding:2rem}
.page-title{font-size:1.4rem;font-weight:800;color:#f8fafc;margin-bottom:1.5rem}
.assignment-card{background:#111827;border:1px solid #1e2330;border-radius:12px;padding:1.5rem;margin-bottom:1.2rem;transition:.2s}
.assignment-card:hover{border-color:#0e8a78}
.a-title{font-size:1rem;font-weight:700;color:#f8fafc;margin-bottom:.3rem}
.a-meta{font-size:.78rem;color:#64748b;margin-bottom:.75rem}
.a-desc{font-size:.875rem;color:#94a3b8;margin-bottom:1rem;line-height:1.5}

/* ── instructor attachment list ── */
.a-files-list{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1rem}
.a-file{display:inline-flex;align-items:center;gap:.4rem;background:#0a0f1a;border:1px solid #1e2330;padding:.4rem .9rem;border-radius:6px;color:#3b9eff;font-size:.82rem;font-weight:600;text-decoration:none;width:fit-content}
.a-file:hover{border-color:#3b9eff}

.reply-section{background:#0a0f1a;border:1px solid #1e2330;border-radius:8px;padding:1rem}
.reply-label{font-size:.78rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem}
.submitted-badge{display:inline-block;background:rgba(14,138,120,.15);color:#0e8a78;border:1px solid rgba(14,138,120,.3);padding:.25rem .7rem;border-radius:12px;font-size:.75rem;font-weight:700;margin-bottom:.75rem}
textarea{width:100%;padding:.65rem .9rem;background:#111827;border:1px solid #1e2330;border-radius:8px;color:#e2e8f0;font-size:.875rem;font-family:inherit;resize:vertical;min-height:80px;margin-bottom:.6rem;transition:border-color .2s,background .2s,box-shadow .2s}
textarea:focus{outline:none;border-color:#0e8a78}
textarea.drag-over{border-color:#0e8a78!important;background:#0d1f14!important;box-shadow:0 0 0 3px rgba(14,138,120,.25)}
.attach-row{display:flex;align-items:center;gap:.6rem;margin-bottom:.5rem;flex-wrap:wrap}
.file-label{background:#0a0f1a;border:1px solid #1e2330;padding:.4rem .9rem;border-radius:6px;color:#94a3b8;font-size:.8rem;cursor:pointer;font-weight:600;transition:all .2s;white-space:nowrap}
.file-label:hover{border-color:#0e8a78;color:#0e8a78}
.img-attach-btn{background:#0a0f1a;border:1px solid #1e2330;padding:.4rem .9rem;border-radius:6px;color:#94a3b8;font-size:.8rem;cursor:pointer;font-weight:600;transition:all .2s;white-space:nowrap}
.img-attach-btn:hover{border-color:#a78bfa;color:#a78bfa}
.attach-hint{font-size:.72rem;color:#475569}

/* ── selected files list (student) ── */
.selected-files{display:flex;flex-direction:column;gap:.3rem;margin-bottom:.5rem}
.selected-file-item{display:flex;align-items:center;gap:.5rem;background:#111827;border:1px solid #1e2330;border-radius:6px;padding:.35rem .75rem;font-size:.78rem;color:#e2e8f0}
.selected-file-item .sf-name{flex:1;color:#0e8a78;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.selected-file-item .sf-size{color:#475569;font-size:.72rem;white-space:nowrap}
.selected-file-item .sf-remove{background:none;border:none;color:#ef4444;cursor:pointer;font-size:.85rem;padding:0 .2rem;line-height:1;flex-shrink:0}
.selected-file-item .sf-remove:hover{color:#dc2626}
.files-count-badge{font-size:.72rem;color:#64748b;margin-bottom:.35rem}

/* previously submitted files */
.submitted-files-list{display:flex;flex-direction:column;gap:.35rem;margin:.4rem 0 .75rem}
.submitted-file-item{display:inline-flex;align-items:center;gap:.4rem;background:#0a0f1a;border:1px solid rgba(14,138,120,.25);padding:.35rem .8rem;border-radius:6px;color:#0e8a78;font-size:.78rem;font-weight:600;text-decoration:none;width:fit-content}
.submitted-file-item:hover{border-color:#0e8a78}

.img-preview-wrap{display:none;position:relative;margin:.6rem 0;width:fit-content}
.img-preview-wrap img{display:block;max-height:180px;max-width:100%;border-radius:8px;border:1px solid #0e8a78;box-shadow:0 0 0 2px rgba(14,138,120,.2)}
.img-preview-remove{position:absolute;top:-8px;right:-8px;width:22px;height:22px;border-radius:50%;background:#ef4444;border:2px solid #0a0f1a;color:#fff;font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1}
.img-preview-remove:hover{background:#dc2626}
.img-preview-meta{font-size:.7rem;color:#475569;margin-top:.25rem}
.submitted-img-wrap{margin:.5rem 0}
.submitted-img-wrap img{max-width:100%;max-height:220px;border-radius:8px;border:1px solid #1e2330;cursor:pointer;transition:opacity .2s}
.submitted-img-wrap img:hover{opacity:.85}
.submitted-img-label{font-size:.72rem;color:#64748b;margin-top:.3rem}
.submit-btn{background:#0e8a78;color:#fff;border:none;padding:.5rem 1.2rem;border-radius:8px;cursor:pointer;font-weight:600;font-size:.85rem;transition:background .2s}
.submit-btn:hover{background:#0a6b5e}
.submit-btn:disabled{background:#1e2330;color:#475569;cursor:not-allowed}
.msg{font-size:.82rem;margin-top:.5rem}
.empty{text-align:center;color:#64748b;padding:4rem;font-size:.95rem}
.badge{padding:.2rem .6rem;border-radius:12px;font-size:.7rem;font-weight:700}
.badge-course{background:rgba(14,138,120,.15);color:#0e8a78;border:1px solid rgba(14,138,120,.3)}
.paste-toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#0e8a78;color:#fff;padding:.55rem 1.1rem;border-radius:8px;font-size:.82rem;font-weight:600;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;z-index:999}
.paste-toast.show{opacity:1;transform:translateY(0)}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:1000;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img{max-width:92vw;max-height:88vh;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.7)}
.lightbox-close{position:absolute;top:1.2rem;right:1.5rem;color:#fff;font-size:2.2rem;cursor:pointer;opacity:.65;line-height:1}
.lightbox-close:hover{opacity:1}
</style>
</head>
<body>
<header>
  <div class="logo"><img src="/KCA-LOGO-transparent.png" alt="KCA"> My Assignments</div>
  <div style="display:flex;gap:.75rem;align-items:center">
    <a href="/dashboard" class="btn" style="background:transparent;border:1px solid #0e8a78;color:#0e8a78">← Dashboard</a>
    <button class="btn" onclick="logout()">Sign Out</button>
  </div>
</header>
<div class="container">
  <div class="page-title">📚 Your Assignments</div>
  <div id="assignmentsList"><div class="empty">Loading assignments...</div></div>
</div>
<div class="paste-toast" id="pasteToast">🖼️ Image pasted!</div>
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">✕</span>
  <img id="lightboxImg" src="" alt="Full size">
</div>
<script>
const token = localStorage.getItem('kca_token');
const user = (() => { try { return JSON.parse(localStorage.getItem('kca_user') || '{}'); } catch(e) { localStorage.removeItem('kca_user'); return {}; } })();
if (!token) window.location.replace('/login');

// stagedImages[id] = File (for pasted/dragged image)
// selectedFiles[id] = FileList or array of File objects
const stagedImages = {};
const selectedFiles = {};
let focusedCardId = null;

function isImagePath(p){ return p && /\.(jpg|jpeg|png|gif|webp)$/i.test(p); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatSize(bytes){ return bytes < 1024*1024 ? (bytes/1024).toFixed(0)+' KB' : (bytes/(1024*1024)).toFixed(1)+' MB'; }
function showToast(msg){ const t=document.getElementById('pasteToast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

/* ── parse multiple file paths stored as JSON array or single path ── */
function parseFilePaths(raw){
  if(!raw) return [];
  try { const p = JSON.parse(raw); return Array.isArray(p) ? p : [p]; } catch(e){ return [raw]; }
}

function fileIcon(path){
  if(isImagePath(path)) return '🖼️';
  if(/\.pdf$/i.test(path)) return '📄';
  if(/\.(doc|docx)$/i.test(path)) return '📝';
  if(/\.(zip|rar|7z)$/i.test(path)) return '📦';
  return '📎';
}

async function loadAssignments(){
  const el = document.getElementById('assignmentsList');
  try {
    const r = await fetch('/api/assignments',{headers:{Authorization:'Bearer '+token}});
    if(!r.ok){
      if(r.status===401||r.status===403){ window.location.replace('/login'); return; }
      throw new Error('Server error: '+r.status);
    }
    const assignments = await r.json();
    if(!Array.isArray(assignments)||!assignments.length){
      el.innerHTML='<div class="empty">📭 No assignments yet. Check back soon!</div>'; return;
    }
    el.innerHTML = assignments.map(a => buildCard(a)).join('');
    assignments.forEach(a => attachCardListeners(a.id));
  } catch(err) {
    console.error('loadAssignments error:', err);
    el.innerHTML='<div class="empty" style="color:#f87171;">⚠️ Failed to load assignments. Please refresh the page.</div>';
  }
}

function buildCard(a){
  const submitted = !!(a.my_reply || a.my_submission);

  /* ── instructor attachment files ── */
  const instrFiles = parseFilePaths(a.file_path);
  let instrFilesHtml = '';
  if(instrFiles.length){
    instrFilesHtml = '<div class="a-files-list">'
      + instrFiles.map(fp => {
          const icon = fileIcon(fp);
          const name = fp.split('/').pop();
          if(isImagePath(fp)){
            return '<a href="'+esc(fp)+'" target="_blank" class="a-file">'+icon+' '+esc(name)+'</a>';
          }
          return '<a href="'+esc(fp)+'" target="_blank" class="a-file">'+icon+' '+esc(name)+'</a>';
        }).join('')
      + '</div>';
  }

  /* ── student previously submitted files ── */
  const submittedFiles = parseFilePaths(a.my_submission);
  let submittedFilesHtml = '';
  if(submittedFiles.length && submittedFiles[0]){
    submittedFilesHtml = '<div class="submitted-files-list">'
      + '<div style="font-size:.72rem;color:#64748b;margin-bottom:.25rem">📁 Previously submitted:</div>'
      + submittedFiles.map(fp => {
          const icon = fileIcon(fp);
          const name = fp.split('/').pop();
          if(isImagePath(fp)){
            return '<div class="submitted-img-wrap">'
              +'<div class="submitted-img-label">'+icon+' '+esc(name)+'</div>'
              +'<img src="'+esc(fp)+'" alt="Submitted" onclick="openLightbox(this.src)" title="Click to enlarge">'
              +'</div>';
          }
          return '<a href="'+esc(fp)+'" target="_blank" class="submitted-file-item">'+icon+' '+esc(name)+'</a>';
        }).join('')
      + '</div>';
  }

  return '<div class="assignment-card" id="card-'+a.id+'">'
    +'<div class="a-title">'+esc(a.title)+'</div>'
    +'<div class="a-meta">📅 '+new Date(a.created_at).toLocaleDateString()+' &nbsp;|&nbsp; 👤 '+esc(a.instructor_name||'Instructor')
    +(a.course?' &nbsp;|&nbsp;<span class="badge badge-course">'+esc(a.course)+'</span>':'')+'</div>'
    +(a.description?'<div class="a-desc">'+a.description+'</div>':'')
    + instrFilesHtml
    +'<div class="reply-section">'
    +'<div class="reply-label">Your Submission</div>'
    +(submitted?'<div class="submitted-badge">✅ Submitted</div>':'')
    +'<textarea id="reply-'+a.id+'" placeholder="Type your answer or notes here...&#10;&#10;Tip: Paste (Ctrl+V) or drag and drop an image here." onfocus="focusedCardId='+a.id+'">'+esc(a.my_reply||'')+'</textarea>'

    /* attach buttons */
    +'<div class="attach-row">'
    +'<label class="file-label" for="file-'+a.id+'">📎 Attach Files</label>'
    +'<input type="file" id="file-'+a.id+'" style="display:none" multiple onchange="onFilesSelected('+a.id+',this)">'
    +'<label class="img-attach-btn" for="img-input-'+a.id+'">🖼️ Attach Image</label>'
    +'<input type="file" id="img-input-'+a.id+'" accept="image/*" style="display:none" onchange="onImageFileSelected('+a.id+',this)">'
    +'<span class="attach-hint">or Ctrl+V paste · drag and drop</span>'
    +'</div>'

    /* selected files list */
    +'<div class="selected-files" id="sel-files-'+a.id+'"></div>'

    /* staged image preview */
    +'<div class="img-preview-wrap" id="img-preview-wrap-'+a.id+'">'
    +'<img id="img-preview-'+a.id+'" src="" alt="Preview">'
    +'<div class="img-preview-remove" onclick="clearStagedImage('+a.id+')">✕</div>'
    +'<div class="img-preview-meta" id="img-preview-meta-'+a.id+'"></div>'
    +'</div>'

    /* previously submitted */
    + submittedFilesHtml

    +'<button class="submit-btn" id="submit-btn-'+a.id+'" onclick="submitReply('+a.id+')">'+(submitted?'🔄 Update Submission':'🚀 Submit')+'</button>'
    +'<div class="msg" id="msg-'+a.id+'"></div>'
    +(a.instructor_reply
      ?'<div style="margin-top:1rem;padding-top:.75rem;border-top:1px solid #1e2330">'
        +'<div style="font-size:.75rem;font-weight:700;color:#0e8a78;margin-bottom:.3rem">💬 Instructor Feedback</div>'
        +'<div style="background:#0a1628;border:1px solid rgba(14,138,120,.3);padding:.75rem;border-radius:8px;font-size:.85rem;color:#e2e8f0;line-height:1.5">'+esc(a.instructor_reply)+'</div>'
        +'</div>'
      :'')
    +'</div></div>';
}

/* ── render selected files list UI for a card ── */
function renderSelectedFiles(id){
  const container = document.getElementById('sel-files-'+id);
  if(!container) return;
  const files = selectedFiles[id] || [];
  const staged = stagedImages[id];
  const allFiles = [...files, ...(staged ? [staged] : [])];
  if(!allFiles.length){ container.innerHTML=''; return; }
  container.innerHTML = '<div class="files-count-badge">'+allFiles.length+' file'+(allFiles.length>1?'s':'')+' selected</div>'
    + allFiles.map((f,i) => {
        const isImg = f.type && f.type.startsWith('image/');
        const icon = isImg ? '🖼️' : '📎';
        const isStaged = staged && f === staged;
        return '<div class="selected-file-item">'
          +'<span>'+icon+'</span>'
          +'<span class="sf-name" title="'+esc(f.name)+'">'+esc(f.name)+'</span>'
          +'<span class="sf-size">'+formatSize(f.size)+'</span>'
          +'<button class="sf-remove" onclick="removeSelectedFile('+id+','+i+','+isStaged+')" title="Remove">✕</button>'
          +'</div>';
      }).join('');
}

function removeSelectedFile(id, index, isStaged){
  if(isStaged){
    clearStagedImage(id);
  } else {
    if(selectedFiles[id]){
      selectedFiles[id].splice(index, 1);
    }
    renderSelectedFiles(id);
  }
}

function attachCardListeners(id){
  const ta=document.getElementById('reply-'+id);
  if(!ta)return;
  ta.addEventListener('dragover',e=>{e.preventDefault();ta.classList.add('drag-over');});
  ta.addEventListener('dragleave',()=>ta.classList.remove('drag-over'));
  ta.addEventListener('drop',e=>{
    e.preventDefault();ta.classList.remove('drag-over');
    const files = e.dataTransfer && e.dataTransfer.files;
    if(!files || !files.length) return;
    // check if any are images for staging
    const imgFile = Array.from(files).find(f => f.type.startsWith('image/'));
    const otherFiles = Array.from(files).filter(f => !f.type.startsWith('image/'));
    if(imgFile) stageImage(id, imgFile);
    if(otherFiles.length){
      if(!selectedFiles[id]) selectedFiles[id] = [];
      selectedFiles[id].push(...otherFiles);
      renderSelectedFiles(id);
    }
  });
}

window.addEventListener('paste',e=>{
  const items=(e.clipboardData||{items:[]}).items||[];
  for(const item of items){
    if(item.type.startsWith('image/')){
      e.preventDefault();
      const f=item.getAsFile();
      const tid=focusedCardId||getFirstCardId();
      if(f&&tid){stageImage(tid,f);showToast('🖼️ Image attached!');}
      break;
    }
  }
});

function getFirstCardId(){const c=document.querySelector('.assignment-card');return c?parseInt(c.id.replace('card-','')):null;}

/* Multiple file selection */
function onFilesSelected(id, input){
  const files = Array.from(input.files);
  if(!files.length) return;
  // separate images from regular files
  const imgs = files.filter(f => f.type.startsWith('image/'));
  const others = files.filter(f => !f.type.startsWith('image/'));
  if(imgs.length) stageImage(id, imgs[0]); // stage first image for preview
  if(!selectedFiles[id]) selectedFiles[id] = [];
  selectedFiles[id].push(...others);
  if(imgs.length > 1) selectedFiles[id].push(...imgs.slice(1)); // extra images added as regular files
  renderSelectedFiles(id);
}

function onImageFileSelected(id,input){
  const f=input.files[0];
  if(f) stageImage(id,f);
}

function stageImage(id,file){
  if(!file.type.startsWith('image/')){
    if(!selectedFiles[id]) selectedFiles[id]=[];
    selectedFiles[id].push(file);
    renderSelectedFiles(id);
    return;
  }
  if(file.size>5*1024*1024){alert('Image must be under 5MB.');return;}
  stagedImages[id]=file;
  const reader=new FileReader();
  reader.onload=e=>{
    const wrap=document.getElementById('img-preview-wrap-'+id);
    const img=document.getElementById('img-preview-'+id);
    const meta=document.getElementById('img-preview-meta-'+id);
    if(wrap&&img&&meta){
      img.src=e.target.result;
      meta.textContent=file.name+' — '+formatSize(file.size);
      wrap.style.display='block';
    }
    renderSelectedFiles(id);
  };
  reader.readAsDataURL(file);
}

function clearStagedImage(id){
  delete stagedImages[id];
  const wrap=document.getElementById('img-preview-wrap-'+id);if(wrap)wrap.style.display='none';
  const img=document.getElementById('img-preview-'+id);if(img)img.src='';
  const meta=document.getElementById('img-preview-meta-'+id);if(meta)meta.textContent='';
  const inp=document.getElementById('img-input-'+id);if(inp)inp.value='';
  renderSelectedFiles(id);
}

async function submitReply(id){
  const replyText=(document.getElementById('reply-'+id)||{value:''}).value.trim();
  const files = selectedFiles[id] || [];
  const stagedImage = stagedImages[id];
  const allFiles = [...files, ...(stagedImage ? [stagedImage] : [])];
  const msg=document.getElementById('msg-'+id);
  const btn=document.getElementById('submit-btn-'+id);

  if(!replyText && !allFiles.length){
    msg.style.color='#e74c3c';
    msg.textContent='⚠️ Please add a reply, attach a file, or paste an image.';
    return;
  }

  const fd=new FormData();
  if(replyText) fd.append('reply_text', replyText);
  // append all files — server currently handles single; we send the first
  // (server upgrade for multi-file is in the companion server.js patch)
  allFiles.forEach(f => fd.append('file', f, f.name));

  msg.style.color='#0e8a78';
  msg.textContent='Submitting...';
  if(btn) btn.disabled=true;

  try{
    const r=await fetch('/api/assignments/'+id+'/submit',{method:'POST',headers:{Authorization:'Bearer '+token},body:fd});
    const d=await r.json();
    if(r.ok){
      msg.textContent='✅ '+d.message;
      selectedFiles[id]=[];
      clearStagedImage(id);
      loadAssignments();
    } else {
      msg.style.color='#e74c3c';
      msg.textContent='❌ '+(d.error||'Failed to submit');
    }
  }catch(e){
    msg.style.color='#e74c3c';
    msg.textContent='❌ Network error. Please try again.';
  }finally{
    if(btn) btn.disabled=false;
  }
}

function openLightbox(src){document.getElementById('lightboxImg').src=src;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox();});
function logout(){localStorage.removeItem('kca_token');localStorage.removeItem('kca_user');window.location.replace('/login');}

loadAssignments();
</script>
</body>
</html>
